<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stationery - Viết Thư Online</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playwrite+VN&family=Satisfy&family=Great+Vibes&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="writing-container">
        <!-- Cột trái: Form nhập liệu -->
        <div class="form-section">
            <!-- TO: Field -->
            <div class="form-group">
                <label class="label-text">To:</label>
                <input type="text" class="input-field" id="toField" placeholder="Who is this note for?" maxlength="25">
                <div class="char-counter">0/25</div>
            </div>

            <!-- FROM: Field (Optional) -->
            <div class="form-group">
                <label class="label-text">From: <span class="optional-tag">Optional</span></label>
                <input type="text" class="input-field" id="fromField" placeholder="(Leave blank to post anonymously)" maxlength="25">
                <div class="char-counter">0/25</div>
            </div>

            <!-- YOUR MESSAGE -->
            <div class="form-group">
                <label class="label-text">Your message</label>
                <textarea class="textarea-field" id="messageField" placeholder="What do you want to say?" maxlength="140"></textarea>
                <div class="char-counter">0/140</div>
            </div>

            <!-- PICK YOUR FLOWERS -->
            <div class="form-group">
                <label class="label-text">Pick your flowers <span class="optional-tag">Optional</span></label>
                <div class="flower-picker">
                    <button type="button" class="flower-option" data-flower="🌼" title="Yellow Flower">🌼</button>
                    <button type="button" class="flower-option" data-flower="🌼" title="Yellow Flower 2">🌼</button>
                    <button type="button" class="flower-option" data-flower="🌹" title="Red Flower">🌹</button>
                    <button type="button" class="flower-option" data-flower="🌺" title="Orange Flower">🌺</button>
                    <button type="button" class="flower-option" data-flower="💙" title="Blue Flower">💙</button>
                    <button type="button" class="flower-option" data-flower="🌸" title="Pink Flower">🌸</button>
                    <button type="button" class="flower-option" data-flower="🌷" title="Tulip">🌷</button>
                </div>
            </div>

            <!-- SELECT YOUR HANDWRITING -->
            <div class="form-group">
                <label class="label-text">Select your handwriting</label>
                <input type="hidden" id="currentFont" value="normal">
                <div class="handwriting-samples">
                    <button type="button" class="handwriting-option" data-font="normal">
                        <span class="sample normal">A quick brown fox jumps over the lazy dog</span>
                    </button>
                    <button type="button" class="handwriting-option" data-font="dancing">
                        <span class="sample dancing">A quick brown fox jumps over the lazy dog</span>
                    </button>
                    <button type="button" class="handwriting-option" data-font="satisfy">
                        <span class="sample satisfy">A quick brown fox jumps over the lazy dog</span>
                    </button>
                    <button type="button" class="handwriting-option" data-font="greatvibes">
                        <span class="sample greatvibes">A quick brown fox jumps over the lazy dog</span>
                    </button>
                    <button type="button" class="handwriting-option" data-font="caveat">
                        <span class="sample caveat">A quick brown fox jumps over the lazy dog</span>
                    </button>
                    <button type="button" class="handwriting-option" data-font="playwritevn">
                        <span class="sample playwritevn">A quick brown fox jumps over the lazy dog</span>
                    </button>
                </div>
            </div>

            <!-- SEND BUTTON -->
            <form id="letterForm" style="display: none;">
                <input type="hidden" name="toField">
                <input type="hidden" name="fromField">
                <input type="hidden" name="messageField">
                <input type="hidden" name="selectedFlower">
            </form>
            <button type="button" class="send-button" id="sendBtn">Send</button>

            <!-- Success Message -->
            <div id="successMessage" class="success-popup" style="display:none;">
                <div class="success-content">✅ Your letter has been sent!</div>
            </div>
        </div>

        <!-- Cột phải: Live Preview -->
        <div class="preview-section">
            <div class="envelope-wrapper">
                <div class="flowers-decoration" id="previewFlower">🌸</div>
                
                <div class="envelope">
                    <!-- Letter Inside (White) -->
                    <div class="envelope-front">
                        <div class="letter-inside">
                            <div class="letter-header">
                                <span class="letter-to">To: <span id="previewTo">You</span></span>
                            </div>
                            
                            <div class="letter-content normal" id="previewMessage">
                                Your message will appear here as you type...
                            </div>
                            
                            <div class="letter-footer">
                                <span id="previewFrom">Someone who cares</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Envelope Back (Tan) -->
                    <div class="envelope-back">
                        <div class="back-address">To:</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
