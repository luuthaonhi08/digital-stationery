<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Stationery - Viết Thư Online</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playwrite+VN&family=Satisfy&family=Great+Vibes&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Cột trái: Form nhập liệu -->
        <div class="form-section">
            <div class="form-header">
                <h1>✉️ Gửi Thư Của Bạn</h1>
                <p>Viết một lá thư đặc biệt cho người yêu thương</p>
            </div>

            <form id="letterForm">
                <!-- TO -->
                <div class="form-group">
                    <label for="toField">👤 Gửi đến:</label>
                    <input type="text" id="toField" placeholder="Tên người nhận" maxlength="50">
                </div>

                <!-- FROM -->
                <div class="form-group">
                    <label for="fromField">💌 Từ:</label>
                    <input type="text" id="fromField" placeholder="Tên của bạn" maxlength="50">
                </div>

                <!-- MESSAGE -->
                <div class="form-group">
                    <label for="messageField">📝 Nội dung thư:</label>
                    <textarea id="messageField" placeholder="Viết tin nhắn của bạn tại đây..." maxlength="1000" rows="8"></textarea>
                    <span class="char-count"><span id="charCount">0</span>/1000</span>
                </div>

                <!-- PICK FLOWERS -->
                <div class="form-group">
                    <label for="flowerSelect">🌸 Chọn loài hoa yêu thích:</label>
                    <div class="flower-grid">
                        <button type="button" class="flower-btn" data-flower="🌹" title="Hoa hồng">🌹</button>
                        <button type="button" class="flower-btn" data-flower="🌺" title="Hoa phong cách">🌺</button>
                        <button type="button" class="flower-btn" data-flower="🌸" title="Hoa anh đào">🌸</button>
                        <button type="button" class="flower-btn" data-flower="🌼" title="Hoa hướng dương">🌼</button>
                        <button type="button" class="flower-btn" data-flower="🌻" title="Hoa cúc">🌻</button>
                        <button type="button" class="flower-btn" data-flower="💐" title="Bó hoa">💐</button>
                        <button type="button" class="flower-btn" data-flower="🌷" title="Hoa tulip">🌷</button>
                        <button type="button" class="flower-btn" data-flower="🥀" title="Hoa hồng héo">🥀</button>
                    </div>
                </div>

                <!-- PICK PICTURES -->
                <div class="form-group">
                    <label for="imageUpload">🖼️ Tải ảnh lên:</label>
                    <input type="file" id="imageUpload" accept="image/*">
                    <p class="file-hint">Chỉ chấp nhận file hình ảnh (JPG, PNG, GIF)</p>
                </div>

                <!-- SELECT HANDWRITING -->
                <div class="form-group">
                    <label for="fontSelect">✍️ Chọn kiểu chữ:</label>
                    <select id="fontSelect">
                        <option value="default">Chữ bình thường</option>
                        <option value="dancing">Dancing Script</option>
                        <option value="satisfy">Satisfy (Chữ tay)</option>
                        <option value="greatvibes">Great Vibes</option>
                        <option value="caveat">Caveat</option>
                        <option value="playwritevn">Playwrite VN</option>
                        <option value="georgia">Georgia (Cổ điển)</option>
                        <option value="cursive">Cursive (Nghệ thuật)</option>
                    </select>
                </div>

                <!-- SEND BUTTON -->
                <button type="submit" class="send-btn">💌 Gửi Thư</button>
            </form>
        </div>

        <!-- Cột phải: Live Preview -->
        <div class="preview-section">
            <div class="envelope-container">
                <!-- Phong bì -->
                <div class="envelope">
                    <div class="envelope-front">
                        <div class="envelope-stamp">📮</div>
                        <div class="envelope-address">
                            <p class="address-to">Gửi đến: <span id="previewTo">Người nhận</span></p>
                            <p class="address-from">Từ: <span id="previewFrom">Người gửi</span></p>
                        </div>
                    </div>
                    
                    <!-- Lá thư bên trong -->
                    <div class="letter">
                        <div class="letter-top">
                            <span class="letter-flower" id="previewFlower">🌸</span>
                        </div>
                        
                        <div class="letter-content" id="previewMessage">
                            Nội dung thư của bạn sẽ xuất hiện tại đây...
                        </div>
                        
                        <div class="letter-signature">
                            <p id="previewSigner">Chân thành,</p>
                            <p id="previewSignerName">❤️</p>
                        </div>
                        
                        <div class="letter-image-container">
                            <img id="previewImage" src="" alt="Ảnh đính kèm" style="display:none;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message" style="display:none;">
                ✅ Thư của bạn đã được gửi vào hòm thư bí mật!
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
